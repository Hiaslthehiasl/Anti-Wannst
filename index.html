<html lang="de">
<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --ink: #1A1A1A;
    --ink-light: #6B6B6B;
    --accent: #2D6A4F;
    --accent-light: #E8F4EE;
    --border: #E2E0D8;
    --done: #2D6A4F;
    --undone: #E2E0D8;
    --warn: #C85C2B;
    --bier: #B8860B;
    --bier-light: #FFFBF0;
    --doner: #8B4513;
  }

  body {
    background: var(--bg);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    color: var(--ink);
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  header {
    padding: 28px 0 20px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 {
    font-family: Georgia, serif;
    font-size: 24px;
    font-weight: normal;
  }

  header .date-info {
    font-size: 12px;
    color: var(--ink-light);
    text-align: right;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .day-tab {
    flex-shrink: 0;
    padding: 10px 16px 8px;
    margin-top: 6px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    background: var(--surface);
    position: relative;
    transition: all 0.15s;
  }

  .day-tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .day-tab .score-dot {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--ink-light);
    color: white;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .day-tab .score-dot.high { background: var(--accent); }
  .day-tab .score-dot.mid { background: var(--bier); }
  .day-tab .score-dot.low { background: var(--warn); }

  .day-view { display: none; }
  .day-view.active { display: block; }

  /* Score banner */
  .score-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .score-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.3s;
  }

  .score-circle .num {
    font-family: Georgia, serif;
    font-size: 20px;
    font-weight: bold;
    line-height: 1;
  }

  .score-circle .max {
    font-size: 10px;
    color: var(--ink-light);
  }

  .score-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .section-header {
    padding: 12px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .section-header .section-score {
    font-size: 12px;
    color: var(--ink);
    text-transform: none;
    letter-spacing: 0;
  }

  /* Habit rows */
  .habit-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    gap: 14px;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .habit-row:last-child { border-bottom: none; }
  .habit-row:active { background: var(--bg); }

  .check {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--undone);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 13px;
    color: transparent;
  }

  .habit-row.done .check {
    background: var(--done);
    border-color: var(--done);
    color: white;
  }

  .habit-text { flex: 1; font-size: 14px; }
  .habit-text .sub { font-size: 12px; color: var(--ink-light); }

  .habit-pts {
    font-size: 11px;
    color: var(--ink-light);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* Meal rows */
  .meal-row {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .meal-row:last-child { border-bottom: none; }
  .meal-row:active { background: var(--bg); }

  .meal-check {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 2px solid var(--undone);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 13px;
    color: transparent;
    margin-top: 2px;
  }

  .meal-row.done .meal-check {
    background: var(--done);
    border-color: var(--done);
    color: white;
  }

  .meal-content { flex: 1; }
  .meal-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--ink-light);
    margin-bottom: 2px;
  }

  .meal-main { font-size: 14px; font-weight: 500; }
  .meal-detail { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
  .meal-wuerze {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .meal-pts {
    font-size: 11px;
    color: var(--ink-light);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Week overview */
  .week-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .week-bar h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink-light);
    margin-bottom: 12px;
  }

  .week-bars {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    height: 60px;
  }

  .week-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .bar-fill {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: var(--border);
    transition: height 0.3s, background 0.3s;
    min-height: 4px;
  }

  .bar-label { font-size: 11px; color: var(--ink-light); }
  .bar-score { font-size: 11px; font-weight: 600; }

  /* Reset button */
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--ink-light);
    cursor: pointer;
    margin-top: 8px;
  }

  .reset-btn:active { background: var(--bg); }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-size: 13px;
  }

  .week-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
  }

  .week-nav span { flex: 1; text-align: center; font-weight: 600; }
</style>
</head>

  { id: 'kuhsee',     label: 'Kuhseerunde 4km',     sub: 'Nüchtern morgens',                         w: { a: 0.05, k: 0.10, p: 0.10 } },

// Meals collectively account for remaining weight per goal:
// A: 35%, K: 0%, P: 0% → each meal = 35/3 ≈ 11.67% of A

const MEAL_WEIGHT_A = 0.35 / 3; // per meal, toward Abnehmen only

const DOENER = { main: 'Döner im Fladenbrot', detail: 'Hähnchen oder Lamm, Salat, Tomaten, Zwiebeln, Joghurtsoße', wuerze: 'Zitrone drüber' };

        { id: 'mi', label: 'Mittag', main: '300g Hühnchenbrust + Paprika + Zucchini', detail: '150g Reis', wuerze: 'Sojasoße + Ingwer + Knoblauch', alt: DOENER },

        { id: 'mi', label: 'Mittag', main: 'Döner im Fladenbrot', detail: 'Lamm oder Hähnchen, Salat, Tomaten, Zwiebeln, Joghurtsoße', wuerze: 'Mit allem, Zitrone drüber', alt: null },

      meals: [

        { id: 'mi', label: 'Mittag', main: 'Döner im Fladenbrot', detail: 'Hähnchen, Salat, Tomaten, Zwiebeln, Joghurtsoße', wuerze: 'Mit allem, scharf', alt: null },

        { id: 'mi', label: 'Mittag', main: 'Döner im Fladenbrot', detail: 'Lamm oder Hähnchen, Salat, Tomaten, Zwiebeln, Joghurtsoße', wuerze: 'Scharf + extra Zwiebeln', alt: null },

        { id: 'mi', label: 'Mittag', main: 'Kein Mittagessen / Döner', detail: 'Optional — kein Mittag gibt Puffer für Pizza + Bier', alt: DOENER },

      ]

};

const DAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr'];
const DAY_FULL = { Mo: 'Montag', Di: 'Dienstag', Mi: 'Mittwoch', Do: 'Donnerstag', Fr: 'Freitag' };
const GOAL_WEIGHTS = { a: 0.40, k: 0.30, p: 0.30 };
const TARGET_WEIGHT = 85.0;

// ─── DATE / KW HELPERS ───────────────────────────────────────────────────────

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}

function getKW(d) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function getDayDate(dayAbbr) {
  const offsets = { Mo: 0, Di: 1, Mi: 2, Do: 3, Fr: 4 };
  const d = new Date(currentMonday);
  d.setDate(d.getDate() + offsets[dayAbbr]);
  return d;
}

function getDateKey(dayAbbr) {
  const d = getDayDate(dayAbbr);
  return d.toISOString().slice(0, 10);
}

function formatDate(d) {
  return d.toLocaleDateString('de-DE', { day: 'numeric', month: 'numeric' });
}

function getMealWeek() {
  return getKW(currentMonday) % 2 === 1 ? 1 : 2;
}

// ─── STATE ──────────────────────────────────────────────────────────────────

let currentMonday = getMonday(new Date());
let currentWeek = getMealWeek();
let currentDay = DAYS[0];
let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem('tracker_v1');
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}

function saveState() {
  try { localStorage.setItem('tracker_v1', JSON.stringify(state)); } catch {}
}

function getKey(week, day, id) {
  // week param ignored — use real date
  return `${getDateKey(day)}_${id}`;
}

function isChecked(week, day, id) { return !!state[getKey(week, day, id)]; }

function toggle(week, day, id) {
  const k = getKey(week, day, id);
  state[k] = !state[k];
  saveState();
  render();
}

// Compute weighted index 0–100 for a day
function getDayIndex(week, day) {
  // Sub-scores per goal (0.0–1.0)
  let a = 0, k = 0, p = 0;

  HABITS.forEach(h => {
    if (isChecked(week, day, h.id)) {
      a += h.w.a;
      k += h.w.k;
      p += h.w.p;
    }
  });

  // Meals contribute only to Abnehmen — either main or alt counts
  WEEKS[week][day].meals.forEach(m => {
    const mainDone = isChecked(week, day, 'meal_' + m.id);
    const altDone = isChecked(week, day, 'meal_alt_' + m.id);
    if (mainDone || altDone) {
      a += MEAL_WEIGHT_A;
    }
  });

  // Cap at 1.0 per goal
  a = Math.min(1, a);
  k = Math.min(1, k);
  p = Math.min(1, p);

  const total = GOAL_WEIGHTS.a * a + GOAL_WEIGHTS.k * k + GOAL_WEIGHTS.p * p;
  return {
    total: Math.round(total * 100),
    a: Math.round(a * 100),
    k: Math.round(k * 100),
    p: Math.round(p * 100),
  };
}

function scoreClass(idx) {
  if (idx >= 80) return 'high';
  if (idx >= 50) return 'mid';
  return 'low';
}

function scoreLabel(idx) {
  if (idx >= 80) return '💪 Starker Tag';
  if (idx >= 60) return '👍 Solider Tag';
  if (idx >= 40) return '🌤 Ausbaufähig';
  return '🌱 Fang an';
}

// Weight tracking
function saveWeight(kg) {
  const key = 'weight_' + new Date().toISOString().slice(0,10);
  state[key] = kg;
  saveState();
}

function getWeightHistory() {
  return Object.entries(state)
    .filter(([k]) => k.startsWith('weight_'))
    .map(([k, v]) => ({ date: k.replace('weight_', ''), kg: v }))
    .sort((a, b) => a.date.localeCompare(b.date));
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function render() {
  renderDateInfo();
  renderTabs();
  renderDayViews();
  renderWeekOverview();
}

function renderDateInfo() {
  const now = new Date();
  document.getElementById('dateInfo').innerHTML =
    new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' }) +
    `<br>KW ${getKW(currentMonday)}`;
}

function renderTabs() {
  const el = document.getElementById('dayTabs');
  const mw = getMealWeek();
  el.innerHTML = DAYS.map(day => {
    const idx = getDayIndex(mw, day);
    const cls = scoreClass(idx.total);
    const active = day === currentDay ? ' active' : '';
    const date = formatDate(getDayDate(day));
    return `<div class="day-tab${active}" onclick="selectDay('${day}')">
      <div style="font-weight:600">${day}</div>
      <div style="font-size:10px; opacity:0.75">${date}</div>
      <span class="score-dot ${cls}">${idx.total}</span>
    </div>`;
  }).join('');
}

function renderDayViews() {
  const el = document.getElementById('dayViews');
  el.innerHTML = DAYS.map(day => {
    const active = day === currentDay ? ' active' : '';
    const mealW = getMealWeek();
    const idx = getDayIndex(mealW, day);
    const cls = scoreClass(idx.total);
    const label = scoreLabel(idx.total);
    const circleColor = cls === 'high' ? 'var(--accent)' : cls === 'mid' ? 'var(--bier)' : 'var(--warn)';
    const isWiegeTag = day === 'Mi';
    const todayKey = 'weight_' + getDayDate(day).toISOString().slice(0,10);
    const savedKg = state[todayKey] || '';

    const habitsHtml = HABITS.map(h => {
      const done = isChecked(currentWeek, day, h.id);
      const topW = Math.max(h.w.a, h.w.k, h.w.p);
      const topGoal = topW === h.w.a ? 'Abnehmen' : topW === h.w.k ? 'Kraft' : 'Produktivität';
      return `<div class="habit-row${done ? ' done' : ''}" onclick="toggle(${mealW}, '${day}', '${h.id}')">
        <div class="check">✓</div>
        <div class="habit-text">
          ${h.label}
          ${h.sub ? `<div class="sub">${h.sub}</div>` : ''}
        </div>
        <div class="habit-pts">${topGoal}</div>
      </div>`;
    }).join('');

    const mealsHtml = WEEKS[currentWeek][day].meals.map(m => {
      const done = isChecked(currentWeek, day, 'meal_' + m.id);
      const doneAlt = isChecked(currentWeek, day, 'meal_alt_' + m.id);
      const hasAlt = m.alt !== null && m.id === 'mi';

      const mainRow = `<div class="meal-row${done ? ' done' : ''}" onclick="toggle(${mealW}, '${day}', 'meal_${m.id}')">
        <div class="meal-check">✓</div>
        <div class="meal-content">
          <div class="meal-label">${m.label}</div>
          <div class="meal-main">${m.main}</div>
          <div class="meal-detail">${m.detail}</div>
          ${m.wuerze ? `<span class="meal-wuerze">${m.wuerze}</span>` : ''}
        </div>
        <div class="meal-pts">Abnehmen</div>
      </div>`;

      const altRow = hasAlt ? `<div class="meal-row${doneAlt ? ' done' : ''}" onclick="toggle(${mealW}, '${day}', 'meal_alt_${m.id}')" style="background: var(--doner-light, #FDF5F0);">
        <div class="meal-check" style="${doneAlt ? 'background:#8B4513;border-color:#8B4513' : 'border-color:#C4956A'}">✓</div>
        <div class="meal-content">
          <div class="meal-label" style="color:#8B4513">↔ Alternative: Döner</div>
          <div class="meal-main">${m.alt.main}</div>
          <div class="meal-detail">${m.alt.detail}</div>
          ${m.alt.wuerze ? `<span class="meal-wuerze" style="background:#F5E6D8;color:#8B4513">${m.alt.wuerze}</span>` : ''}
        </div>
        <div class="meal-pts">Abnehmen</div>
      </div>` : '';

      return mainRow + altRow;
    }).join('');

    const wiegenHtml = isWiegeTag ? `
      <div class="section" style="margin-bottom:12px">
        <div class="section-header"><span>⚖️ Wiegen — Mittwoch nüchtern</span></div>
        <div style="padding: 14px 16px; display:flex; align-items:center; gap:12px;">
          <input type="number" id="weightInput" step="0.1" min="50" max="200"
            value="${savedKg}"
            placeholder="kg eingeben"
            style="border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:16px; width:120px; background:var(--bg);"
            onchange="handleWeightInput(this.value)" />
          <div style="font-size:13px; color:var(--ink-light);">
            Ziel: <strong style="color:var(--accent)">85,0 kg</strong>
            ${savedKg ? `· Noch: <strong style="color:var(--warn)">${Math.max(0, (parseFloat(savedKg) - TARGET_WEIGHT)).toFixed(1)} kg</strong>` : ''}
          </div>
        </div>
        ${renderWeightHistory()}
      </div>` : '';

    // Extra food log — list of items
    const extraListKey = `extras_${getDateKey(day)}`;
    const extraList = state[extraListKey] || [];
    const extraTotalKcal = extraList.reduce((s, e) => s + (e.kcal || 0), 0);
    const planKcal = getDayPlanKcal(mealW, day);
    const totalKcal = planKcal + extraTotalKcal;

    const extraItemsHtml = extraList.map((item, idx2) =>
      `<div style="display:flex; align-items:center; gap:10px; padding:8px 16px; border-bottom:1px solid var(--border);">
        <div style="flex:1; font-size:13px;">${item.text}</div>
        <div style="font-size:13px; font-weight:600; color:var(--warn); white-space:nowrap;">+${item.kcal} kcal</div>
        <button onclick="deleteExtraItem('${day}', ${idx2})" style="background:none; border:none; font-size:16px; color:var(--ink-light); cursor:pointer; padding:0 4px;">✕</button>
      </div>`
    ).join('');

    const extraHtml = `
      <div class="section" style="margin-bottom:12px">
        <div class="section-header">
          <span>🍕 Extras</span>
          ${extraTotalKcal > 0 ? `<span class="section-score" style="color:var(--warn)">+${extraTotalKcal} kcal</span>` : ''}
        </div>
        ${extraItemsHtml}
        <div style="padding:12px 16px;">
          <textarea id="extra_${day}" placeholder="z.B. Chips, 2 Bier, Stück Kuchen…"
            style="width:100%; border:1px solid var(--border); border-radius:8px; padding:10px; font-size:14px; font-family:inherit; resize:none; background:var(--bg); min-height:60px; line-height:1.4; -webkit-user-select:text; user-select:text;"></textarea>
          <div style="display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap;">
            <button id="estimateBtn_${day}" onclick="estimateAndAdd('${day}')"
              style="background:var(--accent); color:white; border:none; border-radius:6px; padding:8px 14px; font-size:13px; cursor:pointer;">
              🤖 Schätzen & übernehmen
            </button>
          </div>
        </div>
      </div>`;

    return `<div class="day-view${active}" id="view_${day}">
      <div class="score-banner">
        <div class="score-circle" style="border-color: ${circleColor}">
          <span class="num" style="color: ${circleColor}">${idx.total}</span>
          <span class="max">/ 100</span>
        </div>
        <div class="score-text">
          <div class="label">${label}</div>
          <div class="sub" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;">
            <span>🥗 ${idx.a}</span>
            <span>💪 ${idx.k}</span>
            <span>💼 ${idx.p}</span>
          </div>
          <div class="sub" style="margin-top:4px; font-size:12px; color:var(--ink);">
            📊 ${totalKcal} kcal
            ${extraTotalKcal > 0 ? `<span style="color:var(--warn)"> (Plan: ${planKcal} + Extra: ${extraTotalKcal})</span>` : ''}
          </div>
        </div>
      </div>

      ${wiegenHtml}
      ${extraHtml}

      <div class="section">
        <div class="section-header">
          <span>Mahlzeiten</span>
          <span class="section-score">${WEEKS[currentWeek][day].meals.filter(m => isChecked(currentWeek, day, 'meal_' + m.id) || isChecked(currentWeek, day, 'meal_alt_' + m.id)).length} / ${WEEKS[currentWeek][day].meals.length}</span>
        </div>
        ${mealsHtml}
      </div>

      <div class="section">
        <div class="section-header">
          <span>Gewohnheiten</span>
          <span class="section-score">${HABITS.filter(h => isChecked(currentWeek, day, h.id)).length} / ${HABITS.length}</span>
        </div>
        ${habitsHtml}
      </div>

      <button class="reset-btn" onclick="resetDay(event, '${day}')">Tag zurücksetzen</button>
    </div>`;
  }).join('');
}

function renderWeightHistory() {
  const hist = getWeightHistory().slice(-6);
  if (hist.length === 0) return '';
  const rows = hist.map(e => {
    const diff = e.kg - TARGET_WEIGHT;
    const col = diff <= 0 ? 'var(--accent)' : 'var(--warn)';
    return `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--border); font-size:13px;">
      <span style="color:var(--ink-light)">${e.date.slice(5).replace('-','.')}</span>
      <span><strong>${e.kg} kg</strong></span>
      <span style="color:${col}">${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg zum Ziel</span>
    </div>`;
  }).join('');
  return `<div style="padding: 0 16px 12px">${rows}</div>`;
}

function handleWeightInput(val) {
  const kg = parseFloat(val);
  if (!isNaN(kg) && kg > 40 && kg < 200) { saveWeight(kg); render(); }
}

function renderWeekOverview() {
  const el = document.getElementById('weekBars');
  const maxH = 48;
  el.innerHTML = DAYS.map(day => {
    const idx = getDayIndex(currentWeek, day);
    const pct = idx.total / 100;
    const h = Math.max(4, Math.round(pct * maxH));
    const color = pct >= 0.8 ? 'var(--accent)' : pct >= 0.5 ? 'var(--bier)' : 'var(--border)';
    return `<div class="week-bar-col">
      <div class="bar-score">${idx.total}</div>
      <div class="bar-fill" style="height: ${h}px; background: ${color}"></div>
      <div class="bar-label">${day}</div>
    </div>`;
  }).join('');
  document.getElementById('weekLabel').textContent = `KW ${getKW(currentMonday)} · ${currentMonday.getFullYear()}`;
}

function selectDay(day) { currentDay = day; render(); }
function prevWeek() {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() - 7);
  render();
}
function nextWeek() {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + 7);
  render();
}

function resetDay(e, day) {
  e.stopPropagation();
  if (!confirm(`${DAY_FULL[day]} zurücksetzen?`)) return;
  HABITS.forEach(h => delete state[getKey(currentWeek, day, h.id)]);
  WEEKS[currentWeek][day].meals.forEach(m => {
    delete state[getKey(currentWeek, day, 'meal_' + m.id)];
    delete state[getKey(currentWeek, day, 'meal_alt_' + m.id)];
  });
  delete state[`extras_${getDateKey(day)}`];
  saveState();
  render();
}

// ─── KCAL ────────────────────────────────────────────────────────────────────

const PLAN_KCAL = {
  1: { Mo: 2050, Di: 1700, Mi: 1920, Do: 1700, Fr: 2200 },
  2: { Mo: 1730, Di: 1950, Mi: 1580, Do: 1980, Fr: 2200 },
};

function getDayPlanKcal(week, day) {
  return PLAN_KCAL[week]?.[day] || 1700;
}

function getDayTotalKcal(week, day) {
  const list = state[`extras_${getDateKey(day)}`] || [];
  const extra = list.reduce((s, e) => s + (e.kcal || 0), 0);
  return getDayPlanKcal(week, day) + extra;
}

// saveExtraText/clearExtra replaced by estimateAndAdd/deleteExtraItem

async function estimateAndAdd(day) {
  const textarea = document.getElementById(`extra_${day}`);
  const text = textarea ? textarea.value.trim() : '';
  if (!text) return;

  const btn = document.getElementById(`estimateBtn_${day}`);
  if (btn) btn.textContent = '⏳ Schätze…';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 100,
        system: 'Du bist ein Ernährungsexperte. Antworte NUR mit einer einzigen Zahl: die geschätzten Gesamtkalorien der genannten Lebensmittel. Keine Einheit, kein Text, nur die Zahl.',
        messages: [{ role: 'user', content: `Schätze die Kalorien: ${text}` }]
      })
    });
    const data = await response.json();
    const kcal = parseInt(data.content?.[0]?.text?.trim());
    if (!isNaN(kcal)) {
      const key = `extras_${getDateKey(day)}`;
      const list = state[key] || [];
      list.push({ text, kcal });
      state[key] = list;
      saveState();
      if (textarea) textarea.value = '';
      render();
    }
  } catch (e) {
    if (btn) btn.textContent = '🤖 Schätzen & übernehmen';
  }
}

function deleteExtraItem(day, idx) {
  const key = `extras_${getDateKey(day)}`;
  const list = state[key] || [];
  list.splice(idx, 1);
  state[key] = list;
  saveState();
  render();
}

function clearExtra(week, day) {
  delete state[`extras_${getDateKey(day)}`];
  saveState();
  render();
}

async function estimateKcal(week, day) { /* legacy — unused */ }

// ─── ANALYSE ─────────────────────────────────────────────────────────────────

function renderAnalyse() {
  const el = document.getElementById('analyseContent');

  // ── Last 4 KW scores ──
  const kwList = [];
  for (let i = 3; i >= 0; i--) {
    const mon = new Date(currentMonday);
    mon.setDate(mon.getDate() - i * 7);
    kwList.push({ mon, kw: getKW(mon) });
  }
  // For analyse, temporarily set currentMonday to compute scores
  const savedMonday = currentMonday;
  const weekScores = kwList.map(({ mon, kw }) => {
    currentMonday = mon;
    const scores = DAYS.map(d => ({ day: d, score: getDayIndex(getMealWeek(), d).total, kw }));
    return scores;
  });
  currentMonday = savedMonday;

  // ── Bar chart: both weeks side by side ──
  const maxH = 80;
  // Weekly average scores
  const weekAvgs = weekScores.map(ws => Math.round(ws.reduce((s,d) => s + d.score, 0) / ws.length));
  const barChartHtml = `
    <div class="section" style="margin-bottom:12px">
      <div class="section-header"><span>Wochenscore (letzte 4 KW)</span></div>
      <div style="padding:16px;">
        <div style="display:flex; gap:8px; align-items:flex-end; height:${maxH + 24}px; margin-bottom:4px;">
          ${kwList.map(({ kw }, i) => {
            const avg = weekAvgs[i];
            const h = Math.max(4, Math.round((avg/100)*maxH));
            const c = avg >= 80 ? 'var(--accent)' : avg >= 50 ? 'var(--bier)' : 'var(--border)';
            const isCurrent = i === kwList.length - 1;
            return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
              <div style="font-size:11px; font-weight:${isCurrent?'700':'400'}; color:var(--ink)">${avg}</div>
              <div style="width:100%; height:${h}px; background:${c}; border-radius:4px 4px 0 0; ${isCurrent?'outline:2px solid var(--accent);':''}" title="KW${kw}: ${avg}"></div>
              <div style="font-size:11px; color:${isCurrent?'var(--accent)':'var(--ink-light)'}; font-weight:${isCurrent?'700':'400'}">KW${kw}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;

  // ── Streak: consecutive days ≥ 70 across both weeks in order ──
  const allDays = weekScores.flat();
  let streak = 0, maxStreak = 0, cur = 0;
  allDays.forEach(d => {
    if (d.score >= 70) { cur++; maxStreak = Math.max(maxStreak, cur); }
    else cur = 0;
  });
  // Current streak from end
  for (let i = allDays.length - 1; i >= 0; i--) {
    if (allDays[i].score >= 70) streak++;
    else break;
  }
  const streakHtml = `
    <div class="section" style="margin-bottom:12px">
      <div class="section-header"><span>Streak (≥ 70 Punkte)</span></div>
      <div style="padding:16px; display:flex; gap:24px;">
        <div style="text-align:center;">
          <div style="font-family:Georgia,serif; font-size:36px; color:var(--accent); line-height:1">${streak}</div>
          <div style="font-size:12px; color:var(--ink-light); margin-top:2px">Aktuell</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:Georgia,serif; font-size:36px; color:var(--ink-light); line-height:1">${maxStreak}</div>
          <div style="font-size:12px; color:var(--ink-light); margin-top:2px">Bestmarke</div>
        </div>
        <div style="flex:1; display:flex; align-items:center; flex-wrap:wrap; gap:4px;">
          ${allDays.map((d, i) => {
            const hit = d.score >= 70;
            const label = `KW${d.kw} ${d.day}`;
            return `<div title="${label}: ${d.score}" style="width:28px;height:28px;border-radius:50%;background:${hit ? 'var(--accent)' : 'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:10px;color:${hit ? 'white' : 'var(--ink-light)'};">${d.score}</div>`;
          }).join('')}
        </div>
      </div>
    </div>`;

  // ── Schwachstellen: habits missed most often across both weeks ──
  const habitMisses = HABITS.map(h => {
    let missed = 0;
    [1, 2].forEach(w => DAYS.forEach(d => {
      if (!isChecked(w, d, h.id)) missed++;
    }));
    return { label: h.label, missed, total: 10 };
  }).sort((a, b) => b.missed - a.missed).slice(0, 5);

  const weakHtml = `
    <div class="section" style="margin-bottom:12px">
      <div class="section-header"><span>Schwachstellen (häufigste Lücken)</span></div>
      ${habitMisses.map(h => {
        const pct = Math.round((h.missed / h.total) * 100);
        const color = pct >= 70 ? 'var(--warn)' : pct >= 40 ? 'var(--bier)' : 'var(--accent)';
        return `<div style="padding:10px 16px; border-bottom:1px solid var(--border);">
          <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
            <span style="font-size:13px">${h.label}</span>
            <span style="font-size:12px; color:${color}">${h.missed}× verpasst</span>
          </div>
          <div style="height:4px; background:var(--border); border-radius:2px;">
            <div style="height:4px; width:${100-pct}%; background:${color}; border-radius:2px; transition:width 0.3s;"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  // ── Gewichtskurve ──
  const weightHist = getWeightHistory();
  let weightHtml = '';
  if (weightHist.length === 0) {
    weightHtml = `<div class="section" style="margin-bottom:12px">
      <div class="section-header"><span>Gewichtsverlauf</span></div>
      <div style="padding:20px 16px; text-align:center; color:var(--ink-light); font-size:13px;">Noch keine Messungen — jeden Mittwoch nüchtern eintragen.</div>
    </div>`;
  } else {
    const vals = weightHist.map(e => e.kg);
    const minV = Math.min(...vals, TARGET_WEIGHT) - 1;
    const maxV = Math.max(...vals, TARGET_WEIGHT) + 1;
    const range = maxV - minV;
    const chartW = 300, chartH = 100;
    const pts = weightHist.map((e, i) => {
      const x = weightHist.length === 1 ? chartW/2 : (i / (weightHist.length - 1)) * chartW;
      const y = chartH - ((e.kg - minV) / range) * chartH;
      return { x, y, kg: e.kg, date: e.date };
    });
    const targetY = chartH - ((TARGET_WEIGHT - minV) / range) * chartH;
    const polyline = pts.map(p => `${p.x},${p.y}`).join(' ');
    const latest = vals[vals.length - 1];
    const diff = (latest - TARGET_WEIGHT).toFixed(1);
    const diffColor = diff <= 0 ? 'var(--accent)' : 'var(--warn)';

    weightHtml = `<div class="section" style="margin-bottom:12px">
      <div class="section-header">
        <span>Gewichtsverlauf</span>
        <span class="section-score" style="color:${diffColor}">${latest} kg · ${diff > 0 ? '+' : ''}${diff} zum Ziel</span>
      </div>
      <div style="padding:16px; overflow-x:auto;">
        <svg viewBox="0 0 ${chartW} ${chartH + 20}" style="width:100%; max-width:${chartW}px; height:auto; display:block;">
          <!-- Target line -->
          <line x1="0" y1="${targetY}" x2="${chartW}" y2="${targetY}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
          <text x="${chartW - 2}" y="${targetY - 4}" font-size="9" fill="var(--accent)" text-anchor="end" opacity="0.7">85 kg</text>
          <!-- Weight line -->
          <polyline points="${polyline}" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linejoin="round"/>
          <!-- Dots -->
          ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--surface)" stroke="var(--ink)" stroke-width="2"/>
            <text x="${p.x}" y="${p.y - 8}" font-size="8" fill="var(--ink-light)" text-anchor="middle">${p.kg}</text>`).join('')}
          <!-- X labels -->
          ${pts.map(p => `<text x="${p.x}" y="${chartH + 14}" font-size="8" fill="var(--ink-light)" text-anchor="middle">${p.date.slice(5).replace('-','.')}</text>`).join('')}
        </svg>
      </div>
    </div>`;
  }

  // ── Kcal chart ──
  // Kcal for current week only
  const kcalChartHtml = (() => {
    const mw = getMealWeek();
    const kcalData = DAYS.map(d => ({ day: d, kcal: getDayTotalKcal(mw, d) }));
    const target = 2500;
    const maxKcal = Math.max(...kcalData.map(d => d.kcal), target) + 200;
    const chartH = 80;
    return `<div class="section" style="margin-bottom:12px">
      <div class="section-header"><span>Kalorien diese Woche (Ziel: 2.500)</span></div>
      <div style="padding:16px;">
        <div style="display:flex; gap:8px; align-items:flex-end; height:${chartH + 24}px; margin-bottom:4px;">
          ${kcalData.map(({ day, kcal }) => {
            const h = Math.max(4, Math.round((kcal/maxKcal)*chartH));
            const targetH = Math.round((target/maxKcal)*chartH);
            const c = kcal > target + 200 ? 'var(--warn)' : kcal > target ? 'var(--bier)' : 'var(--accent)';
            return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
              <div style="font-size:10px; color:var(--ink)">${kcal}</div>
              <div style="width:100%; position:relative; height:${chartH}px; display:flex; align-items:flex-end;">
                <div style="position:absolute; bottom:${targetH}px; left:0; right:0; border-top:1px dashed var(--accent); opacity:0.4;"></div>
                <div style="width:100%; height:${h}px; background:${c}; border-radius:4px 4px 0 0;"></div>
              </div>
              <div style="font-size:11px; color:var(--ink-light)">${day}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="font-size:12px; color:var(--ink-light);">
          <span style="color:var(--warn)">■ über Ziel+200</span>
          <span style="color:var(--bier); margin-left:12px">■ knapp drüber</span>
        </div>
      </div>
    </div>`;
  })();

  el.innerHTML = barChartHtml + kcalChartHtml + streakHtml + weightHtml + weakHtml;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
const todayIdx = new Date().getDay();
const dayMap = { 1: 'Mo', 2: 'Di', 3: 'Mi', 4: 'Do', 5: 'Fr' };
if (dayMap[todayIdx]) currentDay = dayMap[todayIdx];
render();
</script>
